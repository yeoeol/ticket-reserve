services:
  registry:
    image: ${DOCKERHUB_USERNAME}/tr-registry:latest
    container_name: tr-registry
    ports:
      - "8761:8761"
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - tr-network

  gateway-platform:
    image: ${DOCKERHUB_USERNAME}/tr-gateway:latest
    container_name: tr-gateway-platform
    env_file:
      - ./.env
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
    ports:
      - "80:80"
    depends_on:
      registry:
        condition: service_started
    networks:
      - tr-network

  user-service:
    image: ${DOCKERHUB_USERNAME}/tr-user:latest
    container_name: tr-user-service
    env_file:
      - ./.env
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
    ports:
      - "30000:30000"
    depends_on:
      gateway-platform:
        condition: service_started
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:30000/actuator/health" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - tr-network

  busking-service:
    image: ${DOCKERHUB_USERNAME}/tr-busking:latest
    container_name: tr-busking-service
    env_file:
      - ./.env
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
    ports:
      - "30001:30001"
    depends_on:
      user-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:30001/actuator/health" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - tr-network

  image-service:
    image: ${DOCKERHUB_USERNAME}/tr-image:latest
    container_name: tr-image-service
    env_file:
      - ./.env
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
    ports:
      - "33333:33333"
    depends_on:
      user-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:33333/actuator/health" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - tr-network

  notification-service:
    image: ${DOCKERHUB_USERNAME}/tr-notification:latest
    container_name: tr-notification-service
    env_file:
      - ./.env
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
    ports:
      - "34444:34444"
    depends_on:
      busking-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:34444/actuator/health" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - tr-network

  subscription-service:
    image: ${DOCKERHUB_USERNAME}/tr-subscription:latest
    container_name: tr-subscription-service
    env_file:
      - ./.env
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
    ports:
      - "35555:35555"
    depends_on:
      notification-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:35555/actuator/health" ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 150s
    networks:
      - tr-network

  hot-busking-service:
    image: ${DOCKERHUB_USERNAME}/tr-hot-busking:latest
    container_name: tr-hot-busking-service
    env_file:
      - ./.env
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
    ports:
      - "36666:36666"
    depends_on:
      busking-service:
        condition: service_healthy
    networks:
      - tr-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # 로컬/테스트용이면 편의상 끔
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # 백엔드 개발 서버용 메모리 제한
    ports:
      - "9200:9200"
    networks:
      - tr-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch
    networks:
      - tr-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - tr-network

networks:
  tr-network:
    driver: bridge